<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>奔赴B612玫瑰星</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(#1a1033,#2d1b54);
  color:#fff;
  font-family:微软雅黑;
  padding:30px;
}
.time-box{
  display:flex;
  justify-content:space-around;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  margin-bottom:30px;
}
.title{
  text-align:center;
  font-size:28px;
  color:#ffb86c;
  margin:20px 0;
}
.module{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  padding:20px;
  margin:15px 0;
}
</style>
</head>
<body>
<h2 class="title">小王子与他独有的玫瑰</h2>

<div class="time-box">
  <div>
    <p>小王子 · 中国时区</p>
    <p id="chinaTime"></p>
  </div>
  <div>
    <p>玫瑰 · 澳洲时区</p>
    <p id="ausTime"></p>
  </div>
</div>

<div class="module">
  <h3>每日星球打卡</h3>
  <p>记录属于我们的每一天</p>
</div>
<div class="module">
  <h3>双境星河相册</h3>
  <p>山海两岸，皆是思念</p>
</div>
<div class="module">
  <h3>思念信使信箱</h3>
  <p>把心意寄往玫瑰的星球</p>
</div>

<script>
function showTime(){
  let cn = new Date();
  let au = new Date(cn.getTime() + 10*3600000);
  document.getElementById("chinaTime").innerText = cn.toLocaleTimeString();
  document.getElementById("ausTime").innerText = au.toLocaleTimeString();
}
setInterval(showTime,1000);
showTime();
</script>
</body>
</html>
